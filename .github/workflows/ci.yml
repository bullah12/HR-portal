name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    services:
      # Disposable Postgres for the integration tests — wiped every run.
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hr_portal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # The test database above; no live provider is ever contacted — all
      # integrations are env-gated and fall back to local dev mode.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hr_portal_test?schema=public
      AUTH_SECRET: ci-placeholder-secret-not-used-at-build-time
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Apply schema to the test database
        run: npx prisma db push --skip-generate

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
