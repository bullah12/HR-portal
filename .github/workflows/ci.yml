name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    env:
      # Build-time placeholders only — no live database or provider is
      # contacted. All integrations are env-gated and fall back to local
      # dev mode when unset.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hr_portal?schema=public
      AUTH_SECRET: ci-placeholder-secret-not-used-at-build-time
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
